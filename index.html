<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hockey Pishqorky</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@300;400;600&display=swap');
:root {
  --rink-deep:#060f1e; --boards:#0e1a2e; --border:#1e3050;
  --line-red:#cc2200; --line-blue:#1a4fa0; --gold:#f5c518;
  --text-light:#e8f4fb; --text-muted:#5a7a9a;
  --p1c:#FCB514; --p2c:#0038A8;
  --p1glow:rgba(252,181,20,0.5); --p2glow:rgba(0,56,168,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh; background:var(--rink-deep);
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,0.015) 60px),
    repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,0.015) 60px),
    radial-gradient(ellipse 90% 70% at 50% 50%,rgba(20,60,120,0.15) 0%,transparent 70%);
  color:var(--text-light); font-family:'Barlow Condensed',sans-serif;
  display:flex; flex-direction:column; align-items:center; padding:14px 10px 30px;
}
/* HEADER */
.header{text-align:center;margin-bottom:14px;}
.header::before,.header::after{content:'';display:block;width:70px;height:3px;margin:0 auto;border-radius:2px;}
.header::before{background:var(--line-red);margin-bottom:8px;}
.header::after{background:var(--line-blue);margin-top:8px;}
.header h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(1.7rem,5.5vw,3.2rem);letter-spacing:.1em;text-transform:uppercase;color:#e8f4fb;line-height:1;}
.header h1 span{color:var(--gold);}
.header .tagline{font-size:.62rem;letter-spacing:.35em;color:var(--text-muted);text-transform:uppercase;margin-top:6px;}
/* TEAM PICKERS */
.team-pickers{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap;justify-content:center;}
.team-card{background:var(--boards);border:2px solid transparent;border-radius:12px;padding:10px 16px;cursor:pointer;transition:all .2s;text-align:center;min-width:108px;}
.team-card.p1{border-color:var(--p1c);box-shadow:0 0 14px var(--p1glow);}
.team-card.p2{border-color:var(--p2c);box-shadow:0 0 14px var(--p2glow);}
.team-card:hover{transform:translateY(-2px);}
.team-card-label{font-size:.56rem;letter-spacing:.25em;color:var(--text-muted);text-transform:uppercase;margin-bottom:5px;}
.team-card img.card-logo{width:58px;height:58px;object-fit:contain;display:block;margin:0 auto;}
.team-card .team-name{font-family:'Oswald',sans-serif;font-size:.82rem;letter-spacing:.08em;margin-top:4px;white-space:nowrap;}
.team-card.p1 .team-name{color:var(--p1c);}
.team-card.p2 .team-name{color:var(--p2c);}
.edit-hint{font-size:.5rem;color:var(--text-muted);letter-spacing:.1em;margin-top:2px;}
/* POPUP */
.team-popup{display:none;position:fixed;inset:0;background:rgba(4,10,22,.95);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:20px;}
.team-popup.open{display:flex;}
.team-popup h2{font-family:'Oswald',sans-serif;font-size:1.2rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;}
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:4px;}
.team-option{background:var(--boards);border:2px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;text-align:center;transition:all .15s;}
.team-option:hover{border-color:var(--gold);background:#0d1f3c;transform:scale(1.04);}
.team-option.selected{border-color:var(--gold);}
.team-option img{width:62px;height:62px;object-fit:contain;display:block;margin:0 auto;}
.team-option .tname{font-family:'Oswald',sans-serif;font-size:.68rem;letter-spacing:.06em;margin-top:4px;color:var(--text-light);}
.btn-close-popup{background:var(--line-red);color:#fff;border:none;border-radius:8px;padding:8px 24px;font-family:'Oswald',sans-serif;font-size:.85rem;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;}
/* MODE SELECTOR */
.mode-selector{display:flex;gap:8px;margin-bottom:12px;background:var(--boards);border:1px solid var(--border);border-radius:12px;padding:10px 16px;align-items:center;flex-wrap:wrap;justify-content:center;}
.mode-btn{font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;padding:7px 16px;border-radius:8px;border:2px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .2s;}
.mode-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(245,197,24,.08);box-shadow:0 0 10px rgba(245,197,24,.2);}
.diff-wrap{display:none;align-items:center;gap:6px;margin-left:4px;}
.diff-wrap.show{display:flex;}
.diff-btn{font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:6px;border:2px solid var(--border);background:transparent;cursor:pointer;transition:all .2s;}
.diff-btn[data-d="easy"]  {color:#4caf50;}
.diff-btn[data-d="easy"].active  {border-color:#4caf50;background:rgba(76,175,80,.12);}
.diff-btn[data-d="medium"]{color:#ff9800;}
.diff-btn[data-d="medium"].active{border-color:#ff9800;background:rgba(255,152,0,.12);}
.diff-btn[data-d="hard"]  {color:#f44336;}
.diff-btn[data-d="hard"].active  {border-color:#f44336;background:rgba(244,67,54,.12);}
.diff-btn[data-d="gretzky"]  {color:#f5c518;}
.diff-btn[data-d="gretzky"].active  {border-color:#f5c518;background:rgba(245,197,24,.15);box-shadow:0 0 8px rgba(245,197,24,.3);}
.thinking{display:inline-block;animation:blink .6s ease-in-out infinite alternate;}
@keyframes blink{from{opacity:.3}to{opacity:1}}
.cpu-badge{font-size:.5rem;background:var(--gold);color:#000;border-radius:4px;padding:1px 5px;letter-spacing:.1em;font-family:'Oswald',sans-serif;display:inline-block;margin-left:4px;vertical-align:middle;}
/* CONTROLS */
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;background:var(--boards);border:1px solid var(--border);border-radius:12px;padding:11px 16px;margin-bottom:11px;}
.ctrl-group{display:flex;flex-direction:column;gap:4px;align-items:center;}
.ctrl-group label{font-size:.56rem;letter-spacing:.25em;color:var(--text-muted);text-transform:uppercase;}
select{background:#070f1e;color:var(--text-light);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-family:'Barlow Condensed',sans-serif;font-size:.86rem;cursor:pointer;outline:none;}
select:focus{border-color:var(--gold);}
/* BUTTONS */
.btn-row{display:flex;gap:10px;margin-bottom:11px;}
button{font-family:'Oswald',sans-serif;cursor:pointer;border:none;border-radius:8px;padding:9px 20px;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;transition:all .2s;}
.btn-start{background:linear-gradient(135deg,var(--line-red),#8a0e00);color:#fff;box-shadow:0 0 16px rgba(204,34,0,.35);}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(204,34,0,.6);}
.btn-reset{background:transparent;color:var(--text-muted);border:1px solid var(--border);}
.btn-reset:hover{color:var(--text-light);border-color:var(--gold);}
/* SCOREBOARD */
.scoreboard{display:flex;align-items:center;margin-bottom:11px;background:var(--boards);border-radius:12px;overflow:hidden;border:1px solid var(--border);width:100%;max-width:380px;}
.score-side{padding:9px 16px;text-align:center;flex:1;}
.score-side.p1{border-right:2px solid var(--p1c);}
.score-side.p2{border-left:2px solid var(--p2c);}
.score-mid{padding:5px 10px;text-align:center;min-width:56px;}
.score-team{font-family:'Oswald',sans-serif;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;}
.score-side.p1 .score-team{color:var(--p1c);}
.score-side.p2 .score-team{color:var(--p2c);}
.score-num{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;line-height:1;color:#e8f4fb;}
.score-mid .score-num{font-size:.95rem;color:var(--text-muted);}
.score-mid .score-team{color:var(--text-muted);font-size:.5rem;}
/* MUTE BUTTON */
.btn-mute{background:var(--boards);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:.86rem;cursor:pointer;transition:all .2s;color:var(--text-light);}
.btn-mute:hover{border-color:var(--gold);}
.btn-mute.muted{border-color:var(--line-red);opacity:.7;}
/* BEST-OF dots in scoreboard */
.series-dots{display:flex;gap:4px;justify-content:center;margin-top:4px;}
.series-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid currentColor;opacity:.35;transition:all .3s;}
.series-dot.won{opacity:1;background:currentColor;}
.score-side.p1 .series-dot{color:var(--p1c);}
.score-side.p2 .series-dot{color:var(--p2c);}
/* PLAYOFF CHAMPION MODAL */
.playoff-modal{display:none;position:fixed;inset:0;z-index:500;align-items:center;justify-content:center;background:rgba(4,10,22,.96);flex-direction:column;}
.playoff-modal.open{display:flex;}
.playoff-inner{background:linear-gradient(160deg,#0e1a2e,#060f1e);border:2px solid var(--gold);border-radius:20px;padding:32px 28px 24px;text-align:center;max-width:360px;width:90%;box-shadow:0 0 60px rgba(245,197,24,.25);animation:modal-in .4s ease-out;}
@keyframes modal-in{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.trophy-svg{width:120px;height:120px;margin:0 auto 16px;display:block;filter:drop-shadow(0 0 20px rgba(245,197,24,.5));}
.playoff-title{font-family:'Oswald',sans-serif;font-size:.7rem;letter-spacing:.35em;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;}
.playoff-winner{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.playoff-series{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;color:var(--text-muted);letter-spacing:.15em;margin-bottom:20px;}
.playoff-btns{display:flex;gap:10px;justify-content:center;}
.btn-new-series{background:linear-gradient(135deg,var(--gold),#c49a00);color:#000;font-weight:700;padding:10px 22px;}
.btn-new-series:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(245,197,24,.4);}
.btn-end-series{background:transparent;color:var(--text-muted);border:1px solid var(--border);padding:10px 22px;}
.btn-end-series:hover{color:var(--text-light);border-color:var(--text-muted);}
.status-bar{min-height:23px;text-align:center;font-family:'Oswald',sans-serif;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;transition:all .3s;line-height:1.4;}
.status-bar .p1t{color:var(--p1c);}
.status-bar .p2t{color:var(--p2c);}
.status-bar .win-msg{color:var(--gold);}
/* between-game message */
.game-msg{display:none;position:fixed;inset:0;z-index:400;align-items:center;justify-content:center;pointer-events:none;}
.game-msg.show{display:flex;}
.game-msg-inner{background:rgba(6,15,30,.92);border:1px solid var(--border);border-radius:14px;padding:18px 32px;text-align:center;animation:msg-slide .35s ease-out;}
@keyframes msg-slide{from{transform:translateY(-60px);opacity:0}to{transform:translateY(0);opacity:1}}
.game-msg.show .game-msg-inner{animation:msg-slide .35s ease-out;}
.game-msg-result{font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.game-msg-series{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;letter-spacing:.2em;color:var(--text-muted);margin-top:4px;text-transform:uppercase;}
.game-msg-next{display:none;}
/* BOARD */
.board-wrap{overflow:auto;max-width:96vw;max-height:62vh;}
#board{display:grid;gap:2px;background:rgba(180,210,240,.12);border:3px solid rgba(180,210,240,.18);border-radius:10px;overflow:hidden;box-shadow:0 8px 50px rgba(0,0,0,.7);}
.cell{background:rgba(220,240,255,.05);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .12s;position:relative;}
.cell:hover:not(.taken){background:rgba(220,240,255,.13);}
.cell:active:not(.taken){transform:scale(.91);}
.cell.taken{cursor:default;}
.cell img.piece{width:82%;height:82%;object-fit:contain;display:block;}
.cell.p1-cell img.piece{filter:drop-shadow(0 0 5px var(--p1glow));}
.cell.p2-cell img.piece{filter:drop-shadow(0 0 5px var(--p2glow));}
.cell.win-cell{background:rgba(245,197,24,.18)!important;animation:win-pulse .7s ease-in-out infinite alternate;}
@keyframes win-pulse{from{background:rgba(245,197,24,.1)}to{background:rgba(245,197,24,.3)}}
@keyframes pop{0%{transform:scale(.15) rotate(-15deg);opacity:0}65%{transform:scale(1.2) rotate(4deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.cell.pop{animation:pop .22s ease-out;}
</style>
</head>
<body>


<div class="playoff-modal" id="playoff-modal">
  <div class="playoff-inner">
    <div class="playoff-title">🏒 Series Champion</div>
    <svg class="trophy-svg" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
      <!-- Cup base -->
      <rect x="35" y="118" width="50" height="8" rx="4" fill="#f5c518"/>
      <rect x="28" y="110" width="64" height="10" rx="3" fill="#e6b800"/>
      <!-- Stem -->
      <rect x="52" y="88" width="16" height="24" rx="3" fill="#f5c518"/>
      <!-- Handles -->
      <path d="M28,42 Q10,42 10,58 Q10,72 28,72" fill="none" stroke="#f5c518" stroke-width="6" stroke-linecap="round"/>
      <path d="M92,42 Q110,42 110,58 Q110,72 92,72" fill="none" stroke="#f5c518" stroke-width="6" stroke-linecap="round"/>
      <!-- Cup body -->
      <path d="M28,20 L92,20 L85,88 L35,88 Z" fill="#f5c518"/>
      <!-- Cup shine -->
      <path d="M38,26 L48,26 L44,80 L36,80 Z" fill="rgba(255,255,255,0.18)" rx="2"/>
      <!-- Stars -->
      <text x="60" y="62" text-anchor="middle" font-size="28" fill="#c49a00">★</text>
      <!-- Top rim -->
      <rect x="24" y="16" width="72" height="8" rx="4" fill="#e6b800"/>
    </svg>
    <div class="playoff-winner" id="playoff-winner-name">—</div>
    <div class="playoff-series" id="playoff-series-result">wins the series</div>
    <div class="playoff-btns">
      <button class="btn-new-series" onclick="newSeries()">🏒 New Series</button>
      <button class="btn-end-series" onclick="endSeries()">✕ End</button>
    </div>
  </div>
</div>

<div class="team-popup" id="team-popup">
  <h2 id="popup-title">Select Team</h2>
  <div class="team-grid" id="team-grid"></div>
  <button class="btn-close-popup" onclick="closePopup()">✕ Close</button>
</div>

<div class="header">
  <h1>HOCKEY <span>PISHQORKY</span></h1>
  <div class="tagline">NHL Original Six Edition</div>
</div>

<div class="team-pickers">
  <div class="team-card p1" onclick="openPopup(1)">
    <div class="team-card-label">Player 1</div>
    <img class="card-logo" id="logo-p1" src="" alt="">
    <div class="team-name" id="name-p1">—</div>
    <div class="edit-hint">▼ change</div>
  </div>
  <div class="team-card p2" id="card-p2" onclick="openPopup(2)">
    <div class="team-card-label" id="p2-label">Player 2</div>
    <img class="card-logo" id="logo-p2" src="" alt="">
    <div class="team-name" id="name-p2">—</div>
    <div class="edit-hint" id="p2-hint">▼ change</div>
  </div>
</div>

<div class="mode-selector">
  <button class="mode-btn active" id="btn-hvh" onclick="setMode('hvh')">👥 Human vs Human</button>
  <button class="mode-btn" id="btn-hvc" onclick="setMode('hvc')">🤖 Human vs CPU</button>
  <div class="diff-wrap" id="diff-wrap">
    <button class="diff-btn active" data-d="easy"    onclick="setDiff('easy')">Easy</button>
    <button class="diff-btn"         data-d="medium"  onclick="setDiff('medium')">Medium</button>
    <button class="diff-btn"         data-d="hard"    onclick="setDiff('hard')">Hard</button>
    <button class="diff-btn"         data-d="gretzky" onclick="setDiff('gretzky')">Gretzky</button>
  </div>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>Board Size</label>
    <select id="sel-size">
      <option value="3">3 × 3</option><option value="4">4 × 4</option>
      <option value="5">5 × 5</option><option value="6">6 × 6</option>
      <option value="7">7 × 7</option><option value="8" selected>8 × 8</option>
      <option value="9">9 × 9</option><option value="10">10 × 10</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Win Streak</label>
    <select id="sel-win"></select>
  </div>
  <div class="ctrl-group">
    <label>Playoff Mode</label>
    <select id="sel-bestof">
      <option value="0">No limit</option>
      <option value="3">best of 3</option>
      <option value="5">best of 5</option>
      <option value="7" selected>best of 7</option>
      <option value="9">best of 9</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Sound</label>
    <button class="btn-mute" id="btn-mute" onclick="toggleMute()" title="Toggle sound">🔊</button>
  </div>
</div>

<div class="btn-row">
  <button class="btn-start" onclick="faceOff()">🏒 Restart Game</button>
  <button class="btn-reset" onclick="resetScore()">🏆 New Series</button>
</div>

<div class="scoreboard">
  <div class="score-side p1"><div class="score-team" id="sc-name1">—</div><div class="score-num" id="sc-p1">0</div><div class="series-dots" id="dots-p1"></div></div>
  <div class="score-mid">
    <div class="score-num"><span style="font-size:.65rem;letter-spacing:.15em;">GAME </span><span id="sc-game">1</span></div>
    <div class="score-team" id="sc-series"></div>
    <div class="score-team" id="sc-ot" style="color:var(--gold);min-height:12px;"></div>
  </div>
  <div class="score-side p2"><div class="score-team" id="sc-name2">—</div><div class="score-num" id="sc-p2">0</div><div class="series-dots" id="dots-p2"></div></div>
</div>

<div class="status-bar" id="status"></div>
<!-- Between-game message overlay -->
<div class="game-msg" id="game-msg">
  <div class="game-msg-inner">
    <div class="game-msg-result" id="gm-result">—</div>
    <div class="game-msg-series" id="gm-series">—</div>
    <div class="game-msg-next" id="gm-next">Next game starting...</div>
  </div>
</div>
<div class="board-wrap"><div id="board"></div></div>

// ── AUDIO ENGINE ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getACtx(){
  if(!actx) actx = new AudioCtx();
  if(actx.state==='suspended') actx.resume();
  return actx;
}

// 🎺 Fanfára — stadionová "charge" trubka (start i výhra)
function playFanfare(){
  const ctx = getACtx();
  const notes = [
    {f:392, t:0,    d:0.12}, // G4
    {f:523, t:0.13, d:0.12}, // C5
    {f:659, t:0.26, d:0.12}, // E5
    {f:784, t:0.39, d:0.22}, // G5
    {f:659, t:0.62, d:0.10}, // E5
    {f:784, t:0.73, d:0.40}, // G5 long
  ];
  notes.forEach(({f,t,d})=>{
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    const dist = ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for(let i=0;i<256;i++) curve[i]=((i/128)-1)*0.4;
    dist.curve = curve;
    osc.connect(dist); dist.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.value = f;
    const now = ctx.currentTime + t;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.18, now+0.02);
    gain.gain.setValueAtTime(0.18, now+d-0.03);
    gain.gain.linearRampToValueAtTime(0, now+d);
    osc.start(now);
    osc.stop(now+d+0.05);
  });
}

// 🏆 Vítězná fanfára — jednou + překrytí jasotu publika
function playSiren(){
  playFanfareAt(0, 0.28);
  // jasot nastupuje v půlce fanfáry a doznívá po ní
  setTimeout(() => playCrowd(1.4, 0.32), 400);
}

// 🤝 Remíza — jen potlesk, žádná fanfára
function playDraw(){
  playCrowd(2.2, 0.18);
}

// 👏 Potlesk / jasot publika
function playCrowd(duration, volume){
  const ctx = getACtx();
  const now = ctx.currentTime;
  // nárůst jasotu
  const bufLen = Math.floor(ctx.sampleRate * duration);
  const buf = ctx.createBuffer(2, bufLen, ctx.sampleRate);
  for(let ch = 0; ch < 2; ch++){
    const dat = buf.getChannelData(ch);
    for(let i = 0; i < bufLen; i++){
      // šum modulovaný pomalou vlnou = efekt tleskání davu
      const envelope = Math.sin((i / ctx.sampleRate) * Math.PI); // vrchol uprostřed
      dat[i] = (Math.random() * 2 - 1) * envelope;
    }
  }
  const src = ctx.createBufferSource();
  const lp  = ctx.createBiquadFilter();
  const hp  = ctx.createBiquadFilter();
  const gn  = ctx.createGain();
  lp.type = 'lowpass';  lp.frequency.value = 3500;
  hp.type = 'highpass'; hp.frequency.value = 300;
  src.buffer = buf;
  src.connect(hp); hp.connect(lp); lp.connect(gn); gn.connect(ctx.destination);
  gn.gain.setValueAtTime(0, now);
  gn.gain.linearRampToValueAtTime(volume, now + 0.18);
  gn.gain.setValueAtTime(volume, now + duration * 0.7);
  gn.gain.linearRampToValueAtTime(0, now + duration);
  src.start(now);
}

function playFanfareAt(delayMs, volume){
  setTimeout(() => {
    const ctx = getACtx();
    const notes = [
      {f:392, t:0,    d:0.12},
      {f:523, t:0.13, d:0.12},
      {f:659, t:0.26, d:0.12},
      {f:784, t:0.39, d:0.22},
      {f:659, t:0.62, d:0.10},
      {f:784, t:0.73, d:0.40},
    ];
    notes.forEach(({f,t,d})=>{
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      const dist = ctx.createWaveShaper();
      const curve = new Float32Array(256);
      for(let i=0;i<256;i++) curve[i]=((i/128)-1)*0.4;
      dist.curve = curve;
      osc.connect(dist); dist.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.value = f;
      const now = ctx.currentTime + t;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(volume, now+0.02);
      gain.gain.setValueAtTime(volume, now+d-0.03);
      gain.gain.linearRampToValueAtTime(0, now+d);
      osc.start(now);
      osc.stop(now+d+0.05);
    });
  }, delayMs);
}

// 🏒 Odehrání puku — clack impact
function playPuckHit(){
  const ctx = getACtx();
  const now = ctx.currentTime;
  // noise burst
  const bufLen = ctx.sampleRate * 0.08;
  const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufLen;i++) data[i]=(Math.random()*2-1);
  const src  = ctx.createBufferSource();
  const gain = ctx.createGain();
  const filt = ctx.createBiquadFilter();
  src.buffer = buf;
  filt.type = 'bandpass';
  filt.frequency.value = 2800;
  filt.Q.value = 1.8;
  src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0.55, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now+0.08);
  src.start(now);
  // low thud
  const osc  = ctx.createOscillator();
  const og   = ctx.createGain();
  osc.connect(og); og.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(180, now);
  osc.frequency.exponentialRampToValueAtTime(60, now+0.07);
  og.gain.setValueAtTime(0.4, now);
  og.gain.exponentialRampToValueAtTime(0.001, now+0.07);
  osc.start(now); osc.stop(now+0.08);
}

// 🤖 CPU tah — elektronický tick
function playCpuTick(){
  const ctx = getACtx();
  const now = ctx.currentTime;
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1100, now);
  osc.frequency.exponentialRampToValueAtTime(600, now+0.06);
  gain.gain.setValueAtTime(0.12, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now+0.07);
  osc.start(now); osc.stop(now+0.08);
}

// ── STATE ──
let SIZE=8,WIN=4,board=[],currentPlayer=1,gameOver=false;
let scores={1:0,2:0,D:0},selectedTeams=[0,3];
let gameMode='hvh', difficulty='easy', cpuThinking=false;
let nextStarter=1, gamesPlayed=0, isOT=false;
let soundMuted=false;
let bestOf=7; // wins needed = ceil(bestOf/2)

const selSize=document.getElementById('sel-size');
const selWin=document.getElementById('sel-win');
const selBestOf=document.getElementById('sel-bestof');

// ── MUTE ──
function toggleMute(){
  soundMuted=!soundMuted;
  const btn=document.getElementById('btn-mute');
  btn.textContent=soundMuted?'🔇':'🔊';
  btn.classList.toggle('muted',soundMuted);
}
function playSound(fn){ if(!soundMuted) fn(); }

selBestOf.addEventListener('change',()=>{
  bestOf=parseInt(selBestOf.value);
  updateSeriesDots();
});

// ── MODE / DIFFICULTY ──
function setMode(m){
  gameMode=m;
  document.getElementById('btn-hvh').classList.toggle('active',m==='hvh');
  document.getElementById('btn-hvc').classList.toggle('active',m==='hvc');
  document.getElementById('diff-wrap').classList.toggle('show',m==='hvc');
  const lbl=document.getElementById('p2-label');
  const card2=document.getElementById('card-p2');
  if(m==='hvc'){
    lbl.innerHTML='CPU <span class="cpu-badge">AI</span>';
  } else {
    lbl.textContent='Player 2';
  }
  card2.style.cursor='pointer';
  card2.onclick=()=>openPopup(2);
  renderTeamCards();
}
function setDiff(d){
  difficulty=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b.dataset.d===d));
}

// ── WIN OPTIONS ──
function updateWinOptions(){
  const s=parseInt(selSize.value),prev=parseInt(selWin.value)||WIN;
  selWin.innerHTML='';
  for(let i=3;i<=s;i++){const o=document.createElement('option');o.value=i;o.textContent=`${i} in a row`;selWin.appendChild(o);}
  selWin.value=Math.min(Math.max(prev,3),s);
}selSize.addEventListener('change',updateWinOptions);
updateWinOptions();

// ── TEAM CARDS ──
function renderTeamCards(){
  for(let p=1;p<=2;p++){
    const t=TEAMS[selectedTeams[p-1]];
    document.getElementById(`logo-p${p}`).src=t.img;
    document.getElementById(`name-p${p}`).textContent=t.city;
    document.getElementById(`sc-name${p}`).textContent=(p===2&&gameMode==='hvc')?'CPU':t.name;
    document.documentElement.style.setProperty(`--p${p}c`,t.color);
    document.documentElement.style.setProperty(`--p${p}glow`,t.glow);
  }
}
function openPopup(player){
  document.getElementById('popup-title').textContent=`Player ${player} — Select Team`;
  const grid=document.getElementById('team-grid');
  grid.innerHTML='';
  TEAMS.forEach((team,idx)=>{
    const div=document.createElement('div');
    div.className='team-option'+(idx===selectedTeams[player-1]?' selected':'');
    div.innerHTML=`<img src="${team.img}" alt="${team.city}"><div class="tname">${team.city}</div>`;
    div.onclick=()=>{selectTeam(player,idx);closePopup();};
    grid.appendChild(div);
  });
  document.getElementById('team-popup').classList.add('open');
}
function closePopup(){document.getElementById('team-popup').classList.remove('open');}
function selectTeam(player,idx){
  const other=player===1?1:0;
  if(selectedTeams[other]===idx) selectedTeams[other]=selectedTeams[player-1];
  selectedTeams[player-1]=idx;
  renderTeamCards();
}

// ── GAME ──
function startGame(auto=false, ot=false){
  SIZE=parseInt(selSize.value); WIN=parseInt(selWin.value);
  board=Array(SIZE*SIZE).fill(null);
  isOT=ot;
  if(!auto && !ot){ nextStarter=1; gamesPlayed=0; isOT=false; }  // New Series
  if(auto===true && !ot){ gamesPlayed++; }                        // Next game after win
  // auto==='restart' → keeps gamesPlayed as-is
  currentPlayer=nextStarter;
  gameOver=false; cpuThinking=false;
  updateScoreboard();
  renderBoard(); setStatus('turn');
  playSound(playFanfare);
  // If CPU goes first
  if(!gameOver && gameMode==='hvc' && currentPlayer===2){
    cpuThinking=true; renderBoard(); setStatus('thinking');
    const delay=difficulty==='easy'?700:difficulty==='medium'?450:difficulty==='hard'?200:80;
    setTimeout(()=>{ cpuThinking=false; const m=cpuMove(); if(m!==-1) applyMove(m); }, delay);  }
}function renderBoard(){
  const el=document.getElementById('board');
  const px=Math.max(36,Math.min(80,Math.floor(Math.min(window.innerWidth*.92,620)/SIZE)));
  el.style.gridTemplateColumns=`repeat(${SIZE},${px}px)`;
  el.innerHTML='';
  board.forEach((val,idx)=>{
    const cell=document.createElement('div');
    cell.className='cell'+(val?` p${val}-cell taken`:'');
    cell.style.width=px+'px'; cell.style.height=px+'px';
    if(val){
      const img=document.createElement('img');
      img.className='piece'; img.src=TEAMS[selectedTeams[val-1]].img;
      cell.appendChild(img);
    }
    if(!val&&!gameOver) cell.addEventListener('click',()=>makeMove(idx));
    el.appendChild(cell);
  });
}
function makeMove(idx){
  if(board[idx]||gameOver||cpuThinking) return;
  applyMove(idx);
  if(!gameOver && gameMode==='hvc' && currentPlayer===2){
    cpuThinking=true;
    renderBoard(); // disable clicks while CPU thinks
    setStatus('thinking');
    const delay=difficulty==='easy'?700:difficulty==='medium'?450:difficulty==='hard'?200:80;
    setTimeout(()=>{
      const m=cpuMove();
      cpuThinking=false;
      if(m!==-1) applyMove(m);
    }, delay);
  }
}
function applyMove(idx){
  board[idx]=currentPlayer;
  // sound: puck hit for human, cpu tick for CPU
  if(gameMode==='hvc' && currentPlayer===2) playSound(playCpuTick);
  else playSound(playPuckHit);
  renderBoard();
  document.querySelectorAll('.cell')[idx].classList.add('pop');
  const winCells=checkWin(idx);
  if(winCells){
    gameOver=true;
    const cells=document.querySelectorAll('.cell');
    winCells.forEach(i=>cells[i].classList.add('win-cell'));
    scores[currentPlayer]++; updateScoreboard(); updateSeriesDots();
    nextStarter = currentPlayer===1 ? 2 : 1;
    playSound(playSiren);
    const winsNeeded = bestOf>0 ? Math.ceil(bestOf/2) : Infinity;
    if(scores[currentPlayer] >= winsNeeded){
      setTimeout(()=>showPlayoffModal(currentPlayer), 2400);
    } else {
      setTimeout(()=>showGameMsg(currentPlayer), 1600);
    }
    setStatus('win'); return;
  }
  if(board.every(v=>v)){
    gameOver=true;
    playSound(playDraw);
    setStatus('draw');
    // OT — restart after short pause, no point awarded
    setTimeout(()=>startGame(true, true), 2000);
    return;
  }
  currentPlayer=currentPlayer===1?2:1;
  setStatus('turn');
}

// ── AI ──
function cpuMove(){
  const empty=board.map((v,i)=>v===null?i:-1).filter(i=>i!==-1);
  if(!empty.length) return -1;
  if(difficulty==='easy')    return cpuEasy(empty);
  if(difficulty==='medium')  return cpuMedium(empty);
  if(difficulty==='hard')    return cpuHard(empty);
  return cpuGretzky(empty);
}
function cpuEasy(empty){
  if(Math.random()<0.35){ const s=cpuMedium(empty); if(s!==-1) return s; }
  return empty[Math.floor(Math.random()*empty.length)];
}
function cpuMedium(empty){
  for(const i of empty){board[i]=2;if(checkWin(i)){board[i]=null;return i;}board[i]=null;}
  for(const i of empty){board[i]=1;if(checkWin(i)){board[i]=null;return i;}board[i]=null;}
  return bestPositional(empty,2);
}
function cpuHard(empty){
  for(const i of empty){board[i]=2;if(checkWin(i)){board[i]=null;return i;}board[i]=null;}
  for(const i of empty){board[i]=1;if(checkWin(i)){board[i]=null;return i;}board[i]=null;}
  let best=-Infinity,bestIdx=empty[0];
  for(const i of empty){
    board[i]=2;
    const s=scorePos(i,2)-scorePos(i,1)*1.15;
    board[i]=null;
    if(s>best){best=s;bestIdx=i;}
  }
  return bestIdx;
}
function scorePos(idx,p){
  const row=Math.floor(idx/SIZE),col=idx%SIZE;
  let score=0;
  for(const [dr,dc] of [[0,1],[1,0],[1,1],[1,-1]]){
    let cnt=1,open=0;
    for(let s=1;s<WIN;s++){const r=row+dr*s,c=col+dc*s;if(r<0||r>=SIZE||c<0||c>=SIZE)break;const i=r*SIZE+c;if(board[i]===p)cnt++;else{if(!board[i])open++;break;}}
    for(let s=1;s<WIN;s++){const r=row-dr*s,c=col-dc*s;if(r<0||r>=SIZE||c<0||c>=SIZE)break;const i=r*SIZE+c;if(board[i]===p)cnt++;else{if(!board[i])open++;break;}}
    if(cnt>=WIN) score+=100000;
    else if(cnt===WIN-1&&open>0) score+=1000;
    else if(cnt===WIN-2&&open>1) score+=100;
    else score+=cnt*3;
  }
  const cr=SIZE>>1,cc=SIZE>>1;
  score+=Math.max(0,(SIZE-Math.abs(row-cr)-Math.abs(col-cc))*2);
  return score;
}
function bestPositional(empty,p){
  let best=-Infinity,bestIdx=empty[0];
  for(const i of empty){board[i]=p;const s=scorePos(i,p);board[i]=null;if(s>best){best=s;bestIdx=i;}}
  return bestIdx;
}

// GRETZKY: vidí 2 tahy dopředu, blokuje double-threats, buduje pasti
function cpuGretzky(empty){
  // 1. Okamžitá výhra
  for(const i of empty){board[i]=2;if(checkWin(i)){board[i]=null;return i;}board[i]=null;}
  // 2. Zablokuj okamžitou výhru soupeře
  for(const i of empty){board[i]=1;if(checkWin(i)){board[i]=null;return i;}board[i]=null;}
  // 3. Vytvoř double-threat (dvě výherní linie najednou) — soupeř nemůže blokovat obě
  for(const i of empty){
    board[i]=2;
    let threats=0;
    for(const j of empty){
      if(j===i) continue;
      board[j]=2; if(checkWin(j)) threats++; board[j]=null;
    }
    board[i]=null;
    if(threats>=2) return i;
  }
  // 4. Zablokuj double-threat soupeře
  for(const i of empty){
    board[i]=1;
    let threats=0;
    for(const j of empty){
      if(j===i) continue;
      board[j]=1; if(checkWin(j)) threats++; board[j]=null;
    }
    board[i]=null;
    if(threats>=2) return i;
  }
  // 5. Plná poziční analýza s vysokým váhováním
  let best=-Infinity, bestIdx=empty[0];
  for(const i of empty){
    board[i]=2;
    const myScore  = scorePos(i,2) * 1.0;
    const oppScore = scorePos(i,1) * 1.3; // trochu víc váhy na blokování
    board[i]=null;
    const total = myScore + oppScore;
    if(total>best){best=total;bestIdx=i;}
  }
  return bestIdx;
}
function checkWin(lastIdx){
  const row=Math.floor(lastIdx/SIZE),col=lastIdx%SIZE,p=board[lastIdx];
  for(const [dr,dc] of [[0,1],[1,0],[1,1],[1,-1]]){
    const line=[lastIdx];
    for(let s=1;s<WIN;s++){const r=row+dr*s,c=col+dc*s;if(r<0||r>=SIZE||c<0||c>=SIZE)break;const i=r*SIZE+c;if(board[i]!==p)break;line.push(i);}
    for(let s=1;s<WIN;s++){const r=row-dr*s,c=col-dc*s;if(r<0||r>=SIZE||c<0||c>=SIZE)break;const i=r*SIZE+c;if(board[i]!==p)break;line.push(i);}
    if(line.length>=WIN) return line;
  }
  return null;
}

// ── STATUS ──
function setStatus(type){
  const el=document.getElementById('status');
  const t1=TEAMS[selectedTeams[0]],t2=TEAMS[selectedTeams[1]];
  const n2=t2.city;
  const nextName=nextStarter===1?t1.city:n2;
  const nextCls=`p${nextStarter}t`;
  if(type==='thinking'){el.innerHTML=`🤖 CPU is <span class="thinking">thinking...</span>`;return;}
  if(type==='turn'){
    const label=isOT?'⏱ OT — ':'' ;
    if(currentPlayer===1) el.innerHTML=`${label}<span class="p1t">${t1.city}</span> is up 🏒`;
    else el.innerHTML=`${label}<span class="p2t">${n2}</span> is up 🏒`;
  } else if(type==='win'){
    if(currentPlayer===1) el.innerHTML=`🏆 <span class="p1t">${t1.city}</span> wins! &nbsp;·&nbsp; <span class="${nextCls}">${nextName}</span> starts next`;
    else el.innerHTML=`🏆 <span class="p2t">${n2}</span> wins! &nbsp;·&nbsp; <span class="${nextCls}">${nextName}</span> starts next`;
  } else if(type==='draw'){
    el.innerHTML=`<span class="win-msg">🤝 Tie! Starting OT...</span>`;
  } else {
    el.innerHTML='';
  }
}
function showGameMsg(winner){
  const t1=TEAMS[selectedTeams[0]], t2=TEAMS[selectedTeams[1]];
  const n1=t1.city, n2=t2.city;
  const winName = winner===1 ? n1 : n2;
  const winColor = winner===1 ? t1.color : t2.color;
  const winsNeeded = bestOf>0 ? Math.ceil(bestOf/2) : 0;
  let seriesText = `Series: ${scores[1]}–${scores[2]}`;
  if(winsNeeded){
    const lead1=scores[1], lead2=scores[2];
    if(lead1>lead2) seriesText=`${n1} leads ${lead1}–${lead2}`;
    else if(lead2>lead1) seriesText=`${n2} leads ${lead2}–${lead1}`;
    else seriesText=`Series tied ${lead1}–${lead2}`;
  }
  const el=document.getElementById('game-msg');
  document.getElementById('gm-result').textContent=`${winName} wins!`;
  document.getElementById('gm-result').style.color=winColor;
  document.getElementById('gm-series').textContent=seriesText;
  document.getElementById('gm-next').textContent='';
  el.classList.add('show');
  setTimeout(()=>{ el.classList.remove('show'); startGame(true); }, 2200);
}
function updateNextBtn(show){ /* no-op — replaced by showGameMsg */ }
function updateSeriesDots(){
  bestOf = parseInt(selBestOf.value);
  const winsNeeded = bestOf>0 ? Math.ceil(bestOf/2) : 0;
  [1,2].forEach(p=>{
    const el=document.getElementById(`dots-p${p}`);
    el.innerHTML='';
    if(!winsNeeded) return;
    for(let i=0;i<winsNeeded;i++){
      const dot=document.createElement('div');
      dot.className='series-dot'+(i<scores[p]?' won':'');
      el.appendChild(dot);
    }
  });
}
function showPlayoffModal(winner){
  const t1=TEAMS[selectedTeams[0]], t2=TEAMS[selectedTeams[1]];
  const name=winner===1?t1.city:(t2.city);
  const color=winner===1?t1.color:t2.color;
  document.getElementById('playoff-winner-name').textContent=name;
  document.getElementById('playoff-winner-name').style.color=color;
  document.getElementById('playoff-series-result').textContent=
    `wins the series ${scores[1]}–${scores[2]}`;
  document.getElementById('playoff-modal').classList.add('open');
}
function newSeries(){
  document.getElementById('playoff-modal').classList.remove('open');
  scores={1:0,2:0,D:0}; gamesPlayed=0; nextStarter=1; isOT=false;
  updateScoreboard(); updateSeriesDots();
  startGame(false);
}
function endSeries(){
  document.getElementById('playoff-modal').classList.remove('open');
  scores={1:0,2:0,D:0}; gamesPlayed=0; nextStarter=1; isOT=false;
  updateScoreboard(); updateSeriesDots();
  gameOver=true;
  document.getElementById('board').innerHTML='';
  setStatus('');
}function updateScoreboard(){
  document.getElementById('sc-p1').textContent=scores[1];
  document.getElementById('sc-p2').textContent=scores[2];
  document.getElementById('sc-game').textContent = gamesPlayed + 1;
  const seriesText = (scores[1]>0||scores[2]>0) ? `${scores[1]} - ${scores[2]}` : '';
  document.getElementById('sc-series').textContent = seriesText;
  document.getElementById('sc-ot').textContent = isOT ? 'OT' : '';
}
function faceOff(){
  // Restart current game in series — keeps series score and game number
  nextStarter=1; isOT=false;
  startGame('restart');
}
function resetScore(){
  scores={1:0,2:0,D:0}; gamesPlayed=0; nextStarter=1; isOT=false;
  updateScoreboard(); updateSeriesDots();
  startGame(false);
}

renderTeamCards();
updateSeriesDots();
startGame();
